services:
  db:
    image: postgres:15-alpine
    container_name: coresupport_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - coresupport_pg_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: coresupport_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: 
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: coresupport_frontend
    restart: unless-stopped
    ports:
      # Изменил порт на хосте с 3000 на 3001, так как 3000 уже занят
      - "3001:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: coresupport_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  coresupport_pg_data:
