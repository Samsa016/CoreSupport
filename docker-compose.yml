services:
  db:
    image: postgres:16-alpine
    container_name: coresupport_db
    restart: always
    env_file:
      - .env
    volumes:
      - coresupport_pg_data:/var/lib/postgresql/data
    networks:
      - coresupport_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-coresupport_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: coresupport_pgadmin
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - coresupport_net
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coresupport_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coresupport_net

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: coresupport_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - coresupport_net

networks:
  coresupport_net:
    driver: bridge

volumes:
  coresupport_pg_data:
