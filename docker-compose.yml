services:
  db:
    image: postgres:15-alpine
    container_name: coresupport_postgres
    restart: unless-stopped
    env_file:
      # Читаем переменные для создания БД прямо из .env файла
      - .env
    ports:
      - "5432:5432"
    volumes:
      - coresupport_pg_data:/var/lib/postgresql/data

  backend:
    build: .  # Говорит докеру: "собери образ из Dockerfile в этой же папке"
    container_name: coresupport_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: coresupport_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  coresupport_pg_data:
